# services.example.yaml - реестр сервисов для разбора инцидентов.
#
# Здесь заполнен реальный реестр для dwsai-data-agent (prod). Чтобы активировать,
# скопируй файл в `.claude/context/services.yaml` своего проекта (skill incident-triage
# читает именно его). Значения взяты из work-release-manager (release_smoke.sh, SKILL.md).
#
# Skill читает реестр как источник истины: по имени или alias находит сервис и берет
# из него sage_group, sage_system, k8s_cluster, k8s_namespace, gitlab_project,
# gitlab_tenant для проверок в dp_sage_*, dp_kube_*, dp_gitlab_*.

services:
  - name: dwsai-data-agent
    # Под какими именами сервис могут назвать в алерте, тикете или чате.
    aliases:
      - data-agent
      - дата-агент
      - nessy
      - Nessy Data Agent

    # Sage: группа логов (dp_sage_groups).
    sage_group: dwsai
    # Sage: система внутри группы. На этом стеке НЕ совпадает с namespace.
    sage_system: data-agent
    # Sage: окружение.
    sage_env: prod

    # Kubernetes: кластеры, где крутится сервис (prod). Проверяй все.
    k8s_cluster:
      - bm-ix-m5-inside-wl1.prod
      - bm-ix-m5-inside-wl4.prod

    # Kubernetes: namespace(ы) сервиса (prod).
    k8s_namespace:
      - dwsai-data-agent-prod-prod-daas

    # GitLab: проект и tenant для проверки deploy-пайплайнов.
    gitlab_project: dwsai-data-agent
    gitlab_tenant: dwsai

    # Опционально: путь к YAML с индикаторами (метрики, SLO, пороги) относительно
    # `.claude/context/`. Файла индикаторов пока нет, поэтому строка закомментирована.
    # indicators_file: indicators/dwsai-data-agent.yaml

  # Добавляй остальные свои сервисы по той же схеме.
  # - name: <service>
  #   aliases: [...]
  #   sage_group: <...>
  #   sage_system: <...>
  #   k8s_cluster: [<...>]
  #   k8s_namespace: [<...>]
  #   gitlab_project: <...>
  #   gitlab_tenant: <...>

# Опционально, рядом полезно держать `.claude/context/data-flows.yaml`:
# граф зависимостей сервисов (кто кого вызывает, kafka, dwh, внешние HTTP).
# Skill читает его, чтобы отличить сервис-источник инцидента от сервиса,
# который только показывает downstream-симптомы. Пример схемы:
#
# flows:
#   - from: dwsai-data-agent
#     to: <upstream-service>
#     kind: http        # http | grpc | kafka | db | external
#     internal: true    # true - есть в services.yaml; false - внешняя зависимость
